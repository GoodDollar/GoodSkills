# GoodDollarStaking — stake G$ for svG$ shares, fixed APY G$ interest, and GOOD productivity rewards
# ERC20 receipt token "G$ Savings" / svG$; stake via approve+stake or G$ transferAndCall → onTokenTransfer.

meta:
  name: GoodDollarStaking
  version: production
  source:
    - https://raw.githubusercontent.com/GoodDollar/GoodProtocol/master/contracts/governance/GoodDollarStaking.sol
  inherits:
    - ERC20
    - MultiBaseGovernanceShareField
    - DAOContract
    - ReentrancyGuard
    - Pausable
    - StakingRewardsFixedAPY
  note: >
    token is resolved from NameService GOODDOLLAR at construction. withdrawStake(0)
    is used internally to realize withdrawRewards(). Share ERC20 transfers adjust
    productivity bookkeeping for GOOD rewards.
  related:
    - https://docs.gooddollar.org/for-developers/core-contracts
    - references/guides/save.md

stake:
  notes:
    - "Requires prior token.approve(this, amount) on G$."
  mutability: nonpayable
  access: anyone
  inputs:
    - _amount: uint256
  outputs: []
  emits: [Staked]
  errors:
    - TRANSFER_FROM_FAILED
    - WHEN_PAUSED

onTokenTransfer:
  notes:
    - "ERC-677 style hook; msg.sender must be the G$ token address."
  mutability: nonpayable
  access: token-only
  inputs:
    - _from: address
    - _amount: uint256
    - data: bytes
  outputs:
    - success: bool
  emits: [Staked]
  errors:
    - UNSUPPORTED_TOKEN
    - WHEN_PAUSED

withdrawStake:
  notes:
    - "Partial or full redemption of shares; zero shares still mints GOOD rewards path used by withdrawRewards()."
    - "G$ rewards attempted via MINTBURN_WRAPPER RewardsMinter; partial failure emits RewardsNotSent."
  mutability: nonpayable
  access: nonReentrant
  inputs:
    - _shares: uint256
  outputs:
    - goodRewards: uint256
    - gdRewards: uint256
  emits: [StakeWithdraw, RewardsNotSent, ReputationEarned]
  errors:
    - WITHDRAW_TRANSFER_FAILED

withdrawRewards:
  notes:
    - "Computes share-equivalent of accrued G$ interest and calls withdrawStake with that amount."
  mutability: nonpayable
  inputs: []
  outputs:
    - goodRewards: uint256
    - gdRewards: uint256
  emits: [StakeWithdraw, RewardsNotSent, ReputationEarned]

decimals:
  mutability: view
  inputs: []
  outputs:
    - d: uint8

sharesOf:
  mutability: view
  inputs:
    - _account: address
  outputs:
    - shares: uint256

sharesSupply:
  mutability: view
  inputs: []
  outputs:
    - shares: uint256

setMonthlyGOODRewards:
  mutability: nonpayable
  access: avatar
  inputs:
    - _monthlyAmount: uint256
  outputs: []
  emits: [GOODRewardsSet]

setBlockPerYear:
  mutability: nonpayable
  access: avatar
  inputs:
    - _blocksPerYear: uint128
  outputs: []

setGdApy:
  mutability: nonpayable
  access: avatar
  inputs:
    - _interestRatePerBlock: uint128
  outputs: []
  emits: [APYSet]
  errors:
    - APY_LIMIT_BREACH

getRewardsPerBlock:
  mutability: view
  inputs: []
  outputs:
    - goodRewardPerBlock: uint256
    - gdInterestRatePerBlock: uint256

getStaked:
  mutability: view
  inputs:
    - _user: address
  outputs:
    - userStake: uint256
    - totalStaked: uint256

getUserPendingReward:
  mutability: view
  inputs:
    - _user: address
  outputs:
    - goodReward: uint256
    - gdReward: uint256

goodStakerInfo:
  mutability: view
  inputs:
    - _user: address
  outputs:
    - userInfo: UserInfo

totalRewardsPerShare:
  mutability: view
  inputs: []
  outputs:
    - goodRewardPerShare: uint256
    - gdRewardPerShare: uint256

upgrade:
  mutability: nonpayable
  inputs: []
  outputs: []
  emits: [GOODRewardsSet]
  errors:
    - NOT_UPGRADE_DEADLINE_OR_SCHEME
    - GENERIC_CALL_FAILED

pause:
  mutability: nonpayable
  access: avatar
  inputs:
    - _paused: bool
    - _interestRatePerBlock: uint128
  outputs: []

upgradeTo:
  mutability: nonpayable
  access: nonReentrant
  inputs:
    - _newStaking: address
  outputs: []
  emits: [StakeUpgraded]
  errors:
    - NO_BALANCE
    - NOT_DAO_APPROVED_UPGRADE
    - UNABLE_TO_MINT_REWARDS

totalSupply:
  mutability: view
  inputs: []
  outputs:
    - supply: uint256

balanceOf:
  mutability: view
  inputs:
    - account: address
  outputs:
    - balance: uint256

transfer:
  mutability: nonpayable
  inputs:
    - to: address
    - amount: uint256
  outputs:
    - ok: bool
  notes:
    - "Updates productivity and may mint pending GOOD for involved parties."

approve:
  mutability: nonpayable
  inputs:
    - spender: address
    - amount: uint256
  outputs:
    - ok: bool

transferFrom:
  mutability: nonpayable
  inputs:
    - from: address
    - to: address
    - amount: uint256
  outputs:
    - ok: bool

allowance:
  mutability: view
  inputs:
    - owner: address
    - spender: address
  outputs:
    - remaining: uint256

name:
  mutability: view
  inputs: []
  outputs:
    - n: string

symbol:
  mutability: view
  inputs: []
  outputs:
    - s: string

token:
  mutability: view
  inputs: []
  outputs:
    - gd: address

numberOfBlocksPerYear:
  mutability: view
  inputs: []
  outputs:
    - n: uint128

createdAt:
  mutability: view
  inputs: []
  outputs:
    - ts: uint128

daysUntilUpgrade:
  mutability: view
  inputs: []
  outputs:
    - days: uint32

events:
  ReputationEarned:
    indexed:
      - staker: address
    data:
      - amount: uint256
  Staked:
    indexed:
      - staker: address
    data:
      - amount: uint256
  StakeWithdraw:
    indexed:
      - staker: address
    data:
      - actualSharesRedeemed: uint256
      - amount: uint256
      - sharesRequested: uint256
      - goodRewards: uint256
      - gdRewards: uint256
      - actualRewardsSent: uint256
  StakeUpgraded:
    indexed:
      - staker: address
    data:
      - amount: uint256
      - sharesRedeemed: uint256
      - goodRewards: uint256
      - gdRewards: uint256
      - newShares: uint256
  RewardsNotSent:
    indexed:
      - staker: address
    data:
      - gdRewards: uint256
      - actualRewardsSent: uint256
  APYSet:
    indexed: []
    data:
      - newAPY: uint128
  GOODRewardsSet:
    indexed: []
    data:
      - newMonthlyRewards: uint256

errors:
  CONSTRUCTOR_MAX_DAYS: "max two months until upgrade — constructor guard."
  TRANSFER_FROM_FAILED: "transferFrom failed, make sure you approved token transfer — stake."
  UNSUPPORTED_TOKEN: "unsupported token — onTokenTransfer caller."
  WITHDRAW_TRANSFER_FAILED: "withdraw transfer failed — principal transfer in _withdrawStake."
  NO_BALANCE: "no balance — upgradeTo with zero shares."
  NOT_DAO_APPROVED_UPGRADE: "not DAO approved upgrade — upgradeTo scheme check."
  UNABLE_TO_MINT_REWARDS: "unable to mint rewards — upgradeTo full reward delivery check."
  NOT_UPGRADE_DEADLINE_OR_SCHEME: "not deadline or not scheme — upgrade()."
  GENERIC_CALL_FAILED: "calling setMonthlyRewards failed or setAddress failed inside upgrade paths."
  APY_LIMIT_BREACH: "setGdApy aggregate interest limit check via Math64x64."
  WHEN_PAUSED: "Pausable guard on stake paths."
